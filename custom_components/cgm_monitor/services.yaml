reload:
  name: Reload
  description: Reload CGM Monitor configuration from configuration.yaml without restarting Home Assistant.

add_event:
  name: Add CGM Event
  description: Add an event (insulin, meal, exercise, …) to a subject's calendar.
  fields:
    subject:
      name: Subject
      description: The configured CGM subject name, e.g. "CGM Subject 1".
      required: true
      example: CGM Subject 1
      selector:
        text:
    date:
      name: Date
      description: Date of the event (YYYY-MM-DD). Defaults to today if omitted.
      required: false
      example: "2026-03-21"
      selector:
        text:
    time:
      name: Time
      description: Time of the event (HH:MM or HH:MM:SS). Defaults to 12:00 if omitted.
      required: false
      example: "14:30"
      selector:
        text:
    type:
      name: Event Type
      description: Category of the event.
      required: true
      selector:
        select:
          options:
            - Meal
            - Snack
            - Insulin
            - Weighing
            - Custom
    initials:
      name: Initials
      description: Initials of the person (1–4 characters), e.g. "AUTO".
      required: false
      selector:
        text:
    unit:
      name: Unit
      description: Unit for the dose (IU = insulin units, g Carbs = grams of carbohydrates, kg = kilograms, — = no unit).
      required: false
      selector:
        select:
          options:
            - IU
            - g Carbs
            - kg
            - "—"
    dose:
      name: Dose
      description: Amount in the chosen unit.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.5
    note:
      name: Note
      description: Free-text note.
      required: false
      selector:
        text:

delete_event:
  name: Delete CGM Event
  description: Remove an event from a subject's calendar by its UID.
  fields:
    subject:
      name: Subject
      description: The configured CGM subject name, e.g. "CGM Subject 1".
      required: true
      selector:
        text:
    uid:
      name: Event UID
      description: The unique identifier of the event (visible as calendar event UID).
      required: true
      selector:
        text:

export_report:
  name: Export CGM Report
  description: >
    Export glucose history and calendar events to CSV files for all subjects.
    Files are written to {config_dir}/cgm_reports/.
    Defaults to yesterday if no date is given.
  fields:
    date:
      name: Date
      description: Date to export in YYYY-MM-DD format. Defaults to yesterday.
      required: false
      example: "2026-03-21"
      selector:
        text:

generate_report:
  name: Generate CGM Report
  description: >
    Read the exported CSVs, merge them into a full.csv per subject, generate
    a glucose SVG chart per subject, and produce a self-contained HTML report
    with all charts embedded. Run export_report first.
  fields:
    date:
      name: Date
      description: Date to generate report for in YYYY-MM-DD format. Defaults to yesterday.
      required: false
      example: "2026-03-21"
      selector:
        text:

send_report:
  name: Send CGM Report
  description: >
    Send all report files (CSVs + PDF) for a given date as email via a
    configured HA notify (SMTP) service. Run export_report and generate_report first.
  fields:
    notify_service:
      name: Notify Service
      description: >
        The configured HA notify service to use, e.g. "notify.my_smtp".
      required: true
      example: notify.my_smtp
      selector:
        text:
    recipients:
      name: Recipients
      description: Comma-separated list of email addresses.
      required: true
      example: "doctor@example.com, caregiver@example.com"
      selector:
        text:
    date:
      name: Date
      description: Date of the report in YYYY-MM-DD format. Defaults to yesterday.
      required: false
      example: "2026-03-21"
      selector:
        text:

upload_report:
  name: Upload CGM Report to Nextcloud
  description: >
    Create an AES-256 encrypted ZIP file of the glucose CSV for each subject
    and upload it via WebDAV to Nextcloud. Requires a 'nextcloud' block in
    configuration.yaml. Run export_report first.
  fields:
    date:
      name: Date
      description: Date to upload in YYYY-MM-DD format. Defaults to yesterday.
      required: false
      example: "2026-03-21"
      selector:
        text:

send_notification:
  name: Send CGM Notification
  description: >
    Send a push notification for a subject's current glucose state.
    Intended to be called from an automation that handles trigger conditions
    and configures the notification target.
  fields:
    subject:
      name: Subject
      description: The configured CGM subject name, e.g. "CGM Subject 1".
      required: true
      example: CGM Subject 1
      selector:
        text:
    target:
      name: Target
      description: >
        Notify service to call. Use the full service name like
        "notify.mobile_app_myphone" or just "mobile_app_myphone".
      required: true
      example: notify.mobile_app_myphone
      selector:
        text:
