# - falling
# - falling_slightly
# - steady
# - rising_slightly
# - rising
# - rising_quickly

# priority:
# - warning
# - critical

priority_mapping:
  - state: "critical_low"
    trend: "falling_quickly"
    priority: "critical"
  - state: "critical_low"
    trend: "falling_slightly"
    priority: "critical"
  - state: "critical_low"
    trend: "falling"
    priority: "critical"
  - state: "critical_low"
    trend: "steady"
    priority: "critical"
  - state: "critical_low"
    trend: "rising_slightly"
    priority: "warning"
  - state: "critical_low"
    trend: "rising"
    priority: "warning"

  - state: "very_low"
    trend: "falling_quickly"
    priority: "critical"
  - state: "very_low"
    trend: "falling_slightly"
    priority: "warning"
  - state: "very_low"
    trend: "falling"
    priority: "critical"
  - state: "very_low"
    trend: "steady"
    priority: "warning"

  - state: "low"
    trend: "falling_quickly"
    priority: "critical"
  - state: "low"
    trend: "falling_slightly"
    priority: "warning"
  - state: "low"
    trend: "falling"
    priority: "warning"

  - state: "high"
    trend: "rising_quickly"
    priority: "critical"
  - state: "high"
    trend: "rising_slightly"
    priority: "warning"
  - state: "high"
    trend: "rising"
    priority: "warning"

  - state: "very_high"
    trend: "rising_quickly"
    priority: "critical"
  - state: "very_high"
    trend: "rising_slightly"
    priority: "warning"
  - state: "very_high"
    trend: "rising"
    priority: "warning"