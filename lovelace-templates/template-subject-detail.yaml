type: sections
max_columns: 4
title: CGM Subject 2
path: cgm-subject-2
icon: mdi:diabetes
sections:
  - type: grid
    cards:
      - square: false
        type: grid
        cards:
          - type: custom:button-card
            template: cgm_priority
            entity: sensor.cgm_subject_2
            show_name: true
          - type: custom:button-card
            entity: sensor.cgm_subject_2
            show_name: false
            template: cgm_state_badge
            section_mode: true
          - type: custom:button-card
            entity: sensor.cgm_subject_2
            show_name: true
            template: cgm_glucose
            section_mode: true
          - type: custom:button-card
            entity: sensor.cgm_subject_2
            show_name: true
            template: cgm_trend
            section_mode: true
        columns: 5
        grid_options:
          columns: full
    column_span: 4
  - type: grid
    cards:
      - square: false
        type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              title: Glucose – 24 h
              show: true
              colorize_states: true
            graph_span: 2h
            update_interval: 1min
            stacked: false
            yaxis:
              - id: glucose
                min: 0
                max: 400
                apex_config:
                  tickAmount: 8
                  title:
                    text: mg/dL
            apex_config:
              chart:
                height: 300
                toolbar:
                  show: true
                  tools:
                    download: true
                    selection: true
                    zoom: true
                    zoomin: true
                    zoomout: true
                    pan: true
                    reset: true
              fill:
                type: gradient
                gradient:
                  shadeIntensity: 0.3
                  opacityFrom: 0.4
                  opacityTo: 0.05
              tooltip:
                x:
                  format: HH:mm dd/MM
            series:
              - entity: sensor.glucose_random_sugar_01
                name: Glucose
                type: area
                color: "#4caf50"
                stroke_width: 2
                fill_raw: last
                extend_to: now
                yaxis_id: glucose
              - entity: number.cgm_subject_2_critical_low_threshold
                name: Critical Low
                color: "#FF0000"
                curve: straight
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_2_very_low_threshold
                name: Very Low
                color: "#e53935"
                stroke_width: 1.5
                stroke_dash: 4
                curve: straight
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_2_low_threshold
                name: Low
                color: "#fb8c00"
                stroke_width: 1.5
                curve: straight
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_2_high_threshold
                name: High
                color: "#fb8c00"
                stroke_width: 1.5
                stroke_dash: 4
                curve: straight
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_2_very_high_threshold
                name: Very High
                color: "#e53935"
                stroke_width: 1.5
                stroke_dash: 4
                curve: straight
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
        columns: 1
        grid_options:
          columns: full
    column_span: 4
  - type: grid
    cards:
      - square: false
        type: grid
        cards:
          - type: entities
            title: Threshold Controls
            entities:
              - entity: number.cgm_subject_2_critical_low_threshold
                name: Critical Low
                icon: mdi:arrow-collapse-down
              - entity: number.cgm_subject_2_very_low_threshold
                name: Very Low
                icon: mdi:arrow-down
              - entity: number.cgm_subject_2_low_threshold
                name: Low
                icon: mdi:arrow-bottom-right
              - entity: number.cgm_subject_2_high_threshold
                name: High
                icon: mdi:arrow-top-right
              - entity: number.cgm_subject_2_very_high_threshold
                name: Very High
                icon: mdi:arrow-up
        columns: 1
        grid_options:
          columns: full
    column_span: 4
header:
  card:
    type: markdown
    text_only: true
    content: "# CGM Subject 2"
cards: []
