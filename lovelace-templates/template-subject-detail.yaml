type: sections
max_columns: 4
title: Subject Detail
path: cgm-subject-detail
icon: mdi:diabetes
visible: false
dense_section_placement: true
header:
  card:
    type: markdown
    text_only: true
    content: >
      {% set name = states('select.cgm_selected_subject') %}
      # {{ name if name != 'unknown' else 'Subject Detail' }}
cards: []
sections:
  # ── Stats row ──────────────────────────────────────────────────────────────
  - type: grid
    cards:
      - square: false
        type: grid
        columns: 5
        grid_options:
          columns: full
        cards:
          - type: custom:button-card
            template: cgm_selected_priority

          - type: custom:button-card
            template: cgm_selected_state_badge
            section_mode: true

          - type: custom:button-card
            template: cgm_selected_glucose
            section_mode: true

          - type: custom:button-card
            template: cgm_selected_trend
            section_mode: true

          - type: custom:button-card
            template: cgm_selected_notifications
            section_mode: true
    column_span: 4

  # ── Subject selector ───────────────────────────────────────────────────────
  - type: grid
    cards:
      - type: entity
        entity: select.cgm_selected_subject
        name: Subject
    column_span: 4

  # ── Chart ──────────────────────────────────────────────────────────────────
  # NOTE: apexcharts-card requires a static entity ID for history data.
  # Replace `sensor.your_source_glucose_sensor` with the actual source glucose
  # sensor for the subject you primarily use this view for, OR configure a
  # template sensor in configuration.yaml that mirrors the selected subject:
  #
  #   template:
  #     - sensor:
  #         - name: CGM Selected Subject Glucose
  #           unit_of_measurement: mg/dL
  #           state: >
  #             {{ states('sensor.' ~
  #                states('select.cgm_selected_subject') | slugify) }}
  #
  # Note: a template sensor only retains history from when the subject was
  # last selected — it does not carry historical data per subject.
  - type: grid
    cards:
      - square: false
        type: grid
        columns: 1
        grid_options:
          columns: full
        cards:
          - type: custom:apexcharts-card
            header:
              title: Glucose – 24 h
              show: true
              colorize_states: true
            graph_span: 24h
            update_interval: 1min
            stacked: false
            yaxis:
              - id: glucose
                min: 0
                max: 400
                apex_config:
                  tickAmount: 8
                  title:
                    text: mg/dL
            apex_config:
              chart:
                height: 300
                zoom:
                  enabled: true
                toolbar:
                  show: true
                  tools:
                    download: true
                    selection: true
                    zoom: true
                    zoomin: true
                    zoomout: true
                    pan: true
                    reset: true
              tooltip:
                x:
                  format: HH:mm dd/MM
            series:
              - entity: number.cgm_subject_1_critical_low_threshold  # ← adjust slug
                name: Critical Low
                color: "#c62828"
                stroke_width: 1.5
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_1_very_low_threshold
                name: Very Low
                color: "#e53935"
                stroke_width: 1.5
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_1_low_threshold
                name: Low
                color: "#fb8c00"
                stroke_width: 1.5
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_1_high_threshold
                name: High
                color: "#fb8c00"
                stroke_width: 1.5
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_1_very_high_threshold
                name: Very High
                color: "#e53935"
                stroke_width: 1.5
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: sensor.your_source_glucose_sensor  # ← replace with actual source sensor
                name: Glucose
                color: blue
                stroke_width: 2
                extend_to: now
                yaxis_id: glucose
    column_span: 4

  # ── Threshold controls ─────────────────────────────────────────────────────
  # NOTE: standard entity cards require static entity IDs for interactive
  # number sliders. Replace the slug below with the selected subject's slug,
  # or duplicate this section per subject and toggle visibility with card-mod.
  - type: grid
    cards:
      - square: false
        type: grid
        columns: 1
        grid_options:
          columns: full
        cards:
          - type: entities
            title: Threshold Controls
            entities:
              - entity: number.cgm_subject_1_critical_low_threshold  # ← adjust slug
                name: Critical Low
                icon: mdi:arrow-collapse-down
              - entity: number.cgm_subject_1_very_low_threshold
                name: Very Low
                icon: mdi:arrow-down
              - entity: number.cgm_subject_1_low_threshold
                name: Low
                icon: mdi:arrow-bottom-right
              - entity: number.cgm_subject_1_high_threshold
                name: High
                icon: mdi:arrow-top-right
              - entity: number.cgm_subject_1_very_high_threshold
                name: Very High
                icon: mdi:arrow-up
    column_span: 4
