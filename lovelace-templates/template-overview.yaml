type: sections
max_columns: 4
title: Overview
path: sandbox
icon: mdi:home
cards: []
sections:
  - type: grid
    cards:
      - type: markdown
        content: "# Cohort 1"
        text_only: true
      - square: false
        type: grid
        cards:
          - type: custom:button-card
            template: cgm_priority
            entity: sensor.cgm_subject_1_priority
          - type: custom:button-card
            entity: ""
            template: cgm_subject_label
            section_mode: true
            name: Subject 1
            tap_action:
              action: call-service
              service: select.select_option
              service_data:
                entity_id: select.cgm_selected_subject
                option: CGM Subject 1
              navigation_path: /cgm-monitor/cgm-subject-detail
          - type: custom:button-card
            template: cgm_glucose
            entity: sensor.cgm_subject_1
            tap_action:
              action: call-service
              service: select.select_option
              service_data:
                entity_id: select.cgm_selected_subject
                option: CGM Subject 1
              navigation_path: /cgm-monitor/cgm-subject-detail
          - type: custom:button-card
            template: cgm_trend
            entity: sensor.cgm_subject_1_trend
          - type: custom:button-card
            template: cgm_state_badge
            entity: sensor.cgm_subject_1_state
        columns: 5
        grid_options:
          columns: 48
          rows: auto
    column_span: 4
