  # CGM Monitor – button-card templates
  #
  # Add to your dashboard YAML root:
  #   button_card_templates: !include button-card-templates.yaml
  #
  # Entity IDs per subject (name slug = e.g. "cgm_subject_1"):
  #   sensor.<slug>           – glucose value (mg/dL)
  #   sensor.<slug>_state     – CGM state (critical_low / low / ok / high / …)
  #   sensor.<slug>_priority  – priority (critical / warning / normal)
  #   sensor.<slug>_trend     – trend string (only if trend_sensor is configured)
  #
  # Usage:
  #   type: custom:button-card
  #   template: cgm_glucose
  #   entity: sensor.cgm_subject_1           ← glucose entity
  #
  #   type: custom:button-card
  #   template: cgm_state_badge
  #   entity: sensor.cgm_subject_1_state     ← state entity
  #
  # Templates can be overridden per-card — any key set on the card
  # takes precedence over the template value.

  # ── Shared helpers ─────────────────────────────────────────────────────────────

  # Internal: colour and icon keyed on the CGM state string.
  # Used directly by cgm_state_badge (entity.state IS the cgm state).
  # cgm_glucose uses the _cgm_glucose_* variants below, which look up the
  # sibling state entity so the glucose entity can be independently coloured.

  _cgm_state_color: &cgm_state_color >
    [[[
      const s = entity.state;
      if (s === 'critical_low') return '#c62828';
      if (s === 'very_low')     return '#e53935';
      if (s === 'low')          return '#fb8c00';
      if (s === 'ok')           return '#43a047';
      if (s === 'high')         return '#fb8c00';
      if (s === 'very_high')    return '#e53935';
      return 'var(--secondary-text-color)';
    ]]]

  _cgm_state_icon: &cgm_state_icon >
    [[[
      const s = entity.state;
      if (s === 'critical_low') return 'mdi:arrow-collapse-down';
      if (s === 'very_low')     return 'mdi:arrow-down-bold';
      if (s === 'low')          return 'mdi:arrow-bottom-right';
      if (s === 'ok')           return 'mdi:check-circle-outline';
      if (s === 'high')         return 'mdi:arrow-top-right';
      if (s === 'very_high')    return 'mdi:arrow-up-bold';
      return 'mdi:help-circle-outline';
    ]]]

  # Glucose-card variants: look up the sibling state entity
  # (glucose entity id + '_state') to derive colour and icon.
  _cgm_glucose_color: &cgm_glucose_color >
    [[[
      const s = states[entity.entity_id + '_state']?.state ?? 'ok';
      if (s === 'critical_low') return '#c62828';
      if (s === 'very_low')     return '#e53935';
      if (s === 'low')          return '#fb8c00';
      if (s === 'ok')           return '#43a047';
      if (s === 'high')         return '#fb8c00';
      if (s === 'very_high')    return '#e53935';
      return 'var(--secondary-text-color)';
    ]]]

  _cgm_glucose_icon: &cgm_glucose_icon >
    [[[
      const s = states[entity.entity_id + '_state']?.state ?? 'ok';
      if (s === 'critical_low') return 'mdi:arrow-collapse-down';
      if (s === 'very_low')     return 'mdi:arrow-down-bold';
      if (s === 'low')          return 'mdi:arrow-bottom-right';
      if (s === 'ok')           return 'mdi:check-circle-outline';
      if (s === 'high')         return 'mdi:arrow-top-right';
      if (s === 'very_high')    return 'mdi:arrow-up-bold';
      return 'mdi:help-circle-outline';
    ]]]

  # ── Base: shared card layout ───────────────────────────────────────────────────
  # Inherit from this to get the standard icon_label layout and padding.
  # cgm_state extends it further with state-reactive colour.
  cgm_base:
    layout: icon_label
    styles:
      card:
        - padding: 12px 16px
      name:
        - font-size: 0.8em
        - color: var(--secondary-text-color)
        - text-transform: uppercase
        - letter-spacing: 0.05em
        - align-self: center
        - justify-self: start
      label:
        - align-self: center
        - justify-self: start
      icon:
        - width: 28px

  # ── Base: CGM state colour ─────────────────────────────────────────────────────
  # Inherit from this to get state-reactive colour on cards whose entity IS the
  # state sensor (sensor.<slug>_state).
  cgm_state:
    template: cgm_base
    color: *cgm_state_color
    styles:
      icon:
        - width: 28px
        - color: *cgm_state_color

  # ── Glucose value card ─────────────────────────────────────────────────────────
  # Entity: sensor.<slug>  (glucose sensor — state is the numeric mg/dL value)
  # Colour is derived from the sibling state entity (sensor.<slug>_state).
  #
  # Usage:
  #   type: custom:button-card
  #   template: cgm_glucose
  #   entity: sensor.cgm_subject_1
  #   tap_action:
  #     action: navigate
  #     navigation_path: /lovelace/cgm-subject-1
  cgm_glucose:
    template: cgm_base
    show_name: false
    show_label: true
    show_state: false
    name: Glucose
    icon: *cgm_glucose_icon
    color: *cgm_glucose_color
    label: >
      [[[
        return entity.state !== 'unavailable'
          ? entity.state + '\u202fmg/dL'
          : '—';
      ]]]
    styles:
      label:
        - font-size: 1.2em
        - font-weight: 300
        - color: *cgm_glucose_color
      icon:
        - width: 28px
        - color: *cgm_glucose_color

  # ── Trend card ─────────────────────────────────────────────────────────────────
  # Entity: sensor.<slug>_trend  (state is the trend string)
  #
  # Usage:
  #   type: custom:button-card
  #   template: cgm_trend
  #   entity: sensor.cgm_subject_1_trend
  cgm_trend:
    template: cgm_base
    show_name: false
    show_label: true
    show_state: false
    name: Trend
    icon: >
      [[[
        const t = String(entity.state ?? '').toLowerCase();
        if (t.includes('doubleup')   || t === '↑↑')                    return 'mdi:arrow-up-bold';
        if (t.includes('rising')     || t.includes('up')   || t === '↑') return 'mdi:trending-up';
        if (t.includes('doubledown') || t === '↓↓')                    return 'mdi:arrow-down-bold';
        if (t.includes('falling')    || t.includes('down') || t === '↓') return 'mdi:trending-down';
        if (t.includes('flat')       || t.includes('steady') || t === '→') return 'mdi:trending-neutral';
        return 'mdi:minus';
      ]]]
    label: "[[[ return entity.state !== 'unavailable' ? entity.state : '—'; ]]]"
    styles:
      label:
        - font-size: 1.1em
        - font-weight: 500

  # ── State badge ────────────────────────────────────────────────────────────────
  # Entity: sensor.<slug>_state  (state is the CGM state string)
  #
  # Usage:
  #   type: custom:button-card
  #   template: cgm_state_badge
  #   entity: sensor.cgm_subject_1_state
  cgm_state_badge:
    template: cgm_state
    show_name: false
    show_label: true
    show_state: false
    icon: *cgm_state_icon
    label: "[[[ return entity.state !== 'unavailable' ? entity.state.replace(/_/g, ' ') : '—'; ]]]"
    styles:
      label:
        - font-size: 1em
        - font-weight: 600
        - color: *cgm_state_color
        - text-transform: capitalize

  # ── Priority badge ─────────────────────────────────────────────────────────────
  # Entity: sensor.<slug>_priority  (state is critical / warning / normal)
  #
  # Usage:
  #   type: custom:button-card
  #   template: cgm_priority
  #   entity: sensor.cgm_subject_1_priority
  cgm_priority:
    template: cgm_base
    name: Priority
    show_name: false
    show_label: false
    show_state: false
    icon: >
      [[[
        const p = entity.state ?? 'normal';
        if (p === 'critical') return 'mdi:alert-circle';
        if (p === 'warning')  return 'mdi:alert';
        return 'mdi:check-circle-outline';
      ]]]
    color: >
      [[[
        const p = entity.state ?? 'normal';
        if (p === 'critical') return '#c62828';
        if (p === 'warning')  return '#fb8c00';
        return '#43a047';
      ]]]
    styles:
      icon:
        - width: 28px
        - color: >
            [[[
              const p = entity.state ?? 'normal';
              if (p === 'critical') return '#c62828';
              if (p === 'warning')  return '#fb8c00';
              return '#43a047';
            ]]]

  # ── Subject label ──────────────────────────────────────────────────────────────
  cgm_subject_label:
    show_name: true
    show_label: false
    show_state: false
    styles:
      name:
        - font-size: 1.2em
        - font-weight: 600
        - align-self: left
        - justify-self: start
      card:
        - padding: 12px 16px

  # ── Selected-subject variants ───────────────────────────────────────────────
  # These templates read the active subject from select.cgm_selected_subject
  # and derive the entity ID dynamically. Use them in the shared subject-detail
  # view so a single view works for all subjects.
  #
  # All cards use entity: select.cgm_selected_subject so they re-render when
  # the selection changes. triggers_update: all ensures they also re-render
  # when the underlying sensor values update.

  # Shared JS snippet (repeated inline — YAML anchors can't span JS strings).
  # In each template below:
  #   name  = states['select.cgm_selected_subject'].state  (e.g. "CGM Subject 1")
  #   slug  = "cgm_subject_1"  (HA slugify equivalent)

  cgm_selected_priority:
    template: cgm_base
    entity: select.cgm_selected_subject
    triggers_update: all
    show_name: false
    show_label: false
    show_state: false
    icon: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const p = states[`sensor.${slug}_priority`]?.state ?? 'normal';
        if (p === 'critical') return 'mdi:alert-circle';
        if (p === 'warning')  return 'mdi:alert';
        return 'mdi:check-circle-outline';
      ]]]
    color: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const p = states[`sensor.${slug}_priority`]?.state ?? 'normal';
        if (p === 'critical') return '#c62828';
        if (p === 'warning')  return '#fb8c00';
        return '#43a047';
      ]]]
    styles:
      icon:
        - width: 28px
        - color: >
            [[[
              const name = states['select.cgm_selected_subject']?.state ?? '';
              const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
              const p = states[`sensor.${slug}_priority`]?.state ?? 'normal';
              if (p === 'critical') return '#c62828';
              if (p === 'warning')  return '#fb8c00';
              return '#43a047';
            ]]]

  cgm_selected_glucose:
    template: cgm_base
    entity: select.cgm_selected_subject
    triggers_update: all
    show_name: false
    show_label: true
    show_state: false
    icon: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const s = states[`sensor.${slug}_state`]?.state ?? 'ok';
        if (s === 'critical_low') return 'mdi:arrow-collapse-down';
        if (s === 'very_low')     return 'mdi:arrow-down-bold';
        if (s === 'low')          return 'mdi:arrow-bottom-right';
        if (s === 'ok')           return 'mdi:check-circle-outline';
        if (s === 'high')         return 'mdi:arrow-top-right';
        if (s === 'very_high')    return 'mdi:arrow-up-bold';
        return 'mdi:help-circle-outline';
      ]]]
    color: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const s = states[`sensor.${slug}_state`]?.state ?? 'ok';
        if (s === 'critical_low') return '#c62828';
        if (s === 'very_low')     return '#e53935';
        if (s === 'low')          return '#fb8c00';
        if (s === 'ok')           return '#43a047';
        if (s === 'high')         return '#fb8c00';
        if (s === 'very_high')    return '#e53935';
        return 'var(--secondary-text-color)';
      ]]]
    label: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const g = states[`sensor.${slug}`]?.state;
        return g && g !== 'unavailable' ? g + '\u202fmg/dL' : '—';
      ]]]
    styles:
      label:
        - font-size: 1.2em
        - font-weight: 300
        - color: >
            [[[
              const name = states['select.cgm_selected_subject']?.state ?? '';
              const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
              const s = states[`sensor.${slug}_state`]?.state ?? 'ok';
              if (s === 'critical_low') return '#c62828';
              if (s === 'very_low')     return '#e53935';
              if (s === 'low')          return '#fb8c00';
              if (s === 'ok')           return '#43a047';
              if (s === 'high')         return '#fb8c00';
              if (s === 'very_high')    return '#e53935';
              return 'var(--secondary-text-color)';
            ]]]
      icon:
        - width: 28px
        - color: >
            [[[
              const name = states['select.cgm_selected_subject']?.state ?? '';
              const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
              const s = states[`sensor.${slug}_state`]?.state ?? 'ok';
              if (s === 'critical_low') return '#c62828';
              if (s === 'very_low')     return '#e53935';
              if (s === 'low')          return '#fb8c00';
              if (s === 'ok')           return '#43a047';
              if (s === 'high')         return '#fb8c00';
              if (s === 'very_high')    return '#e53935';
              return 'var(--secondary-text-color)';
            ]]]

  cgm_selected_state_badge:
    template: cgm_base
    entity: select.cgm_selected_subject
    triggers_update: all
    show_name: false
    show_label: true
    show_state: false
    icon: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const s = states[`sensor.${slug}_state`]?.state ?? 'ok';
        if (s === 'critical_low') return 'mdi:arrow-collapse-down';
        if (s === 'very_low')     return 'mdi:arrow-down-bold';
        if (s === 'low')          return 'mdi:arrow-bottom-right';
        if (s === 'ok')           return 'mdi:check-circle-outline';
        if (s === 'high')         return 'mdi:arrow-top-right';
        if (s === 'very_high')    return 'mdi:arrow-up-bold';
        return 'mdi:help-circle-outline';
      ]]]
    color: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const s = states[`sensor.${slug}_state`]?.state ?? 'ok';
        if (s === 'critical_low') return '#c62828';
        if (s === 'very_low')     return '#e53935';
        if (s === 'low')          return '#fb8c00';
        if (s === 'ok')           return '#43a047';
        if (s === 'high')         return '#fb8c00';
        if (s === 'very_high')    return '#e53935';
        return 'var(--secondary-text-color)';
      ]]]
    label: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const s = states[`sensor.${slug}_state`]?.state ?? '';
        return s ? s.replace(/_/g, ' ') : '—';
      ]]]
    styles:
      label:
        - font-size: 1em
        - font-weight: 600
        - text-transform: capitalize
        - color: >
            [[[
              const name = states['select.cgm_selected_subject']?.state ?? '';
              const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
              const s = states[`sensor.${slug}_state`]?.state ?? 'ok';
              if (s === 'critical_low') return '#c62828';
              if (s === 'very_low')     return '#e53935';
              if (s === 'low')          return '#fb8c00';
              if (s === 'ok')           return '#43a047';
              if (s === 'high')         return '#fb8c00';
              if (s === 'very_high')    return '#e53935';
              return 'var(--secondary-text-color)';
            ]]]

  cgm_selected_trend:
    template: cgm_base
    entity: select.cgm_selected_subject
    triggers_update: all
    show_name: false
    show_label: true
    show_state: false
    icon: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const t = String(states[`sensor.${slug}_trend`]?.state ?? '').toLowerCase();
        if (t.includes('doubleup')   || t === '↑↑')                     return 'mdi:arrow-up-bold';
        if (t.includes('rising')     || t.includes('up')   || t === '↑') return 'mdi:trending-up';
        if (t.includes('doubledown') || t === '↓↓')                     return 'mdi:arrow-down-bold';
        if (t.includes('falling')    || t.includes('down') || t === '↓') return 'mdi:trending-down';
        if (t.includes('flat') || t.includes('steady')    || t === '→') return 'mdi:trending-neutral';
        return 'mdi:minus';
      ]]]
    label: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const t = states[`sensor.${slug}_trend`]?.state;
        return t && t !== 'unavailable' ? t : '—';
      ]]]
    styles:
      label:
        - font-size: 1.1em
        - font-weight: 500

  cgm_selected_notifications:
    template: cgm_base
    entity: select.cgm_selected_subject
    triggers_update: all
    show_name: true
    show_label: false
    show_state: false
    name: Notifications
    icon: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        return states[`switch.${slug}_notifications`]?.state === 'on'
          ? 'mdi:bell' : 'mdi:bell-off';
      ]]]
    color: >
      [[[
        const name = states['select.cgm_selected_subject']?.state ?? '';
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        return states[`switch.${slug}_notifications`]?.state === 'on'
          ? 'var(--primary-color)' : 'var(--secondary-text-color)';
      ]]]
    tap_action:
      action: call-service
      service: switch.toggle
      service_data:
        entity_id: >
          [[[
            const name = states['select.cgm_selected_subject']?.state ?? '';
            const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
            return `switch.${slug}_notifications`;
          ]]]
