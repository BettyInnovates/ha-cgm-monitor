advanced_entities_templates:
  t_overview_subject_main:
    show_state: false
    secondary_info: last-changed
    icon: |
      [[[
        const p = entity.state ?? 'normal';
        if (p === 'critical') return 'mdi:alert-circle';
        if (p === 'warning')  return 'mdi:alert';
        return 'mdi:check-circle-outline';
      ]]]
    styles:
      row:
        - '--state-icon-color': |-
            [[[
              const p = entity.state ?? 'normal';
              if (p === 'critical') return '#c62828';
              if (p === 'warning')  return '#fb8c00';
              return '#43a047';
            ]]]
  t_overview_subject_icon:
    icon: |
      [[[
        const s = states[entity.entity_id + '_state']?.state ?? 'ok';
        if (s === 'critical_low') return 'mdi:arrow-collapse-down';
        if (s === 'very_low')     return 'mdi:arrow-down-bold';
        if (s === 'low')          return 'mdi:arrow-bottom-right';
        if (s === 'ok')           return 'mdi:check-circle-outline';
        if (s === 'high')         return 'mdi:arrow-top-right';
        if (s === 'very_high')    return 'mdi:arrow-up-bold';
        return 'mdi:help-circle-outline';
      ]]]
    styles:
      icon:
        - color: |
            [[[
              const s = states[entity.entity_id + '_state']?.state ?? 'ok';
              if (s === 'critical_low') return '#c62828';
              if (s === 'very_low')     return '#e53935';
              if (s === 'low')          return '#fb8c00';
              if (s === 'ok')           return '#43a047';
              if (s === 'high')         return '#fb8c00';
              if (s === 'very_high')    return '#e53935';
              return 'var(--secondary-text-color)';
            ]]]
    name: false
  t_overview_subject_trend_icon:
    icon: |
      [[[
        const t = String(entity.state ?? '').toLowerCase();
        if (t === 'rising_quickly')   return 'mdi:arrow-up-bold';
        if (t === 'rising_slightly')  return 'mdi:trending-up';
        if (t === 'rising')           return 'mdi:trending-up';
        if (t === 'falling')          return 'mdi:trending-down';
        if (t === 'falling_slightly') return 'mdi:trending-down';
        if (t === 'falling_quickly')  return 'mdi:mdi:arrow-down-bold';
        if (t === 'steady')           return 'mdi:trending-neutral';
        return 'mdi:minus';
      ]]]
    styles:
      icon:
        - color: |
            [[[
              const t = String(entity.state ?? '').toLowerCase();
              if (t === 'rising_quickly')   return '#c62828';
              if (t === 'rising_slightly')  return '#e53935';
              if (t === 'rising')           return '#fb8c00';
              if (t === 'falling')          return '#fb8c00';
              if (t === 'falling_slightly') return '#e53935';
              if (t === 'falling_quickly')  return '#c62828';
              if (t === 'steady')           return '#43a047';
              return 'grey';
            ]]]
    name: false
  t_overview_subject_value:
