type: sections
max_columns: 4
title: CGM Subject 2
path: cgm-subject-2
icon: mdi:diabetes
sections:
  - type: grid
    cards:
      - square: false
        type: grid
        cards:
          - type: custom:button-card
            template: cgm_priority
            entity: sensor.cgm_subject_2_priority
            show_name: true
          - type: custom:button-card
            entity: sensor.cgm_subject_2_state
            show_name: false
            template: cgm_state_badge
            section_mode: true
          - type: custom:button-card
            entity: sensor.cgm_subject_2
            show_name: true
            template: cgm_glucose
            section_mode: true
          - type: custom:button-card
            entity: sensor.cgm_subject_2_trend
            show_name: true
            template: cgm_trend
            section_mode: true
        columns: 4
        grid_options:
          columns: full
    column_span: 4
  - type: grid
    cards:
      - square: false
        type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              title: Glucose – 24 h
              show: true
              colorize_states: true
            graph_span: 24h
            update_interval: 1min
            stacked: false
            yaxis:
              - id: glucose
                min: 0
                max: 400
                apex_config:
                  tickAmount: 8
                  title:
                    text: mg/dL
            apex_config:
              chart:
                height: 300
                zoom:
                  enabled: true
                toolbar:
                  show: true
                  tools:
                    download: true
                    selection: true
                    zoom: true
                    zoomin: true
                    zoomout: true
                    pan: true
                    reset: true
              tooltip:
                x:
                  format: HH:mm dd/MM
            series:
              - entity: number.cgm_subject_2_critical_low_threshold
                name: Critical Low
                color: "#c62828"
                stroke_width: 1.5
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_2_very_low_threshold
                name: Very Low
                color: "#e53935"
                stroke_width: 1.5
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_2_low_threshold
                name: Low
                color: "#fb8c00"
                stroke_width: 1.5
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_2_high_threshold
                name: High
                color: "#fb8c00"
                stroke_width: 1.5
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: number.cgm_subject_2_very_high_threshold
                name: Very High
                color: "#e53935"
                stroke_width: 1.5
                stroke_dash: 4
                yaxis_id: glucose
                show:
                  legend_value: true
                  in_header: false
                  datalabels: false
              - entity: sensor.glucose_random_sugar_01
                name: Glucose
                color: blue
                stroke_width: 2
                extend_to: now
                yaxis_id: glucose
        columns: 1
        grid_options:
          columns: full
    column_span: 4
  - type: grid
    cards:
      - type: heading
        icon: mdi:border-bottom-variant
        heading: Thresholds
        heading_style: title
      - square: false
        type: grid
        cards:
          - type: custom:button-card
            entity: number.cgm_subject_2_very_high_threshold
            show_name: true
            name: Very High
            show_state: true
            show_icon: true
            icon: mdi:arrow-up-bold
          - type: custom:button-card
            entity: number.cgm_subject_2_high_threshold
            show_name: true
            name: High
            show_state: true
            show_icon: true
            icon: mdi:arrow-top-right
          - type: custom:button-card
            entity: number.cgm_subject_2_low_threshold
            show_name: true
            name: Low
            show_state: true
            show_icon: true
            icon: mdi:arrow-bottom-right
          - type: custom:button-card
            entity: number.cgm_subject_2_very_low_threshold
            show_name: true
            name: Very Low
            show_state: true
            show_icon: true
            icon: mdi:arrow-down-bold
          - type: custom:button-card
            entity: number.cgm_subject_2_critical_low_threshold
            show_name: true
            name: Critical Low
            show_state: true
            show_icon: true
            icon: mdi:arrow-collapse-down
        columns: 5
        grid_options:
          columns: full
    column_span: 4
  - type: grid
    column_span: 4
    cards:
      - type: heading
        icon: mdi:calendar
        heading: Events
        heading_style: title
      - initial_view: listWeek
        type: calendar
        entities:
          - calendar.cgm_subject_2_events
        grid_options:
          columns: full
          rows: 6
      - type: heading
        icon: mdi:calendar-edit
        heading: Add Event
        heading_style: title
      - square: false
        type: grid
        columns: 1
        grid_options:
          columns: full
        cards:
          - type: entities
            entities:
              - entity: date.cgm_subject_2_event_date
                name: Date
                icon: mdi:calendar
              - entity: time.cgm_subject_2_event_time
                name: Time
                icon: mdi:clock-outline
              - entity: select.cgm_subject_2_event_type
                name: Type
                icon: mdi:tag-outline
              - entity: select.cgm_subject_2_event_unit
                name: Unit
                icon: mdi:scale
              - entity: number.cgm_subject_2_event_dose
                name: Dose
                icon: mdi:needle
              - entity: text.cgm_subject_2_event_note
                name: Note
                icon: mdi:text
      - square: false
        type: grid
        cards:
          - type: custom:button-card
            name: Save
            icon: mdi:content-save-outline
            layout: icon_name
            tap_action:
              action: multi-actions
              actions:
                - action: call-service
                  service: cgm_monitor.add_event
                  service_data:
                    subject: CGM Subject 2
                    date: >-
                      [[[ return states['date.cgm_subject_2_event_date']?.state;
                      ]]]
                    time: >-
                      [[[ return states['time.cgm_subject_2_event_time']?.state;
                      ]]]
                    type: >-
                      [[[ return states['select.cgm_subject_2_event_type']?.state;
                      ]]]
                    unit: >-
                      [[[ return states['select.cgm_subject_2_event_unit']?.state;
                      ]]]
                    dose: >-
                      [[[ return
                      parseFloat(states['number.cgm_subject_2_event_dose']?.state)
                      || 0; ]]]
                    note: >-
                      [[[ return states['text.cgm_subject_2_event_note']?.state ||
                      ''; ]]]
                - action: navigate
                  navigation_path: "[[[ return window.location.pathname; ]]]"
                - action: call-service
                  service: browser_mod.notification
                  service_data:
                    message: Event saved.
                    duration: 4
                - action: call-service
                  service: browser_mod.refresh
            grid_options:
              columns: 2
              rows: 1
            styles:
              card:
                - background-color: var(--primary-color)
                - height: 42px
                - padding: 0 20px
              name:
                - color: white
                - font-size: 0.95em
                - font-weight: 500
              icon:
                - color: white
                - width: 18px
header:
  card:
    type: markdown
    text_only: true
    content: "# CGM Subject 2"
cards: []
