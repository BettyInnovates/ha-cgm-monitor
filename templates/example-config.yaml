cgm_monitor:
  nextcloud:
    url: "https://your-nextcloud.example.com"
    user: "service_account"
    password: !secret cgm_nextcloud_password
    path: "CGM_Reports"        # folder created automatically if it doesn't exist
    zip_password: !secret cgm_report_zip_password

# secrets.yaml (never commit this file):
#   cgm_nextcloud_password: "your-nextcloud-app-password"
#   cgm_report_zip_password: "password-you-share-with-the-customer"

sensor:
  - platform: cgm_monitor
    name: "CGM Subject 1"
    glucose_sensor: "sensor.glucose_random_sugar_01"
    trend_sensor: "sensor.glucose_random_trend_01"
  - platform: cgm_monitor
    name: "CGM Subject 2"
    glucose_sensor: "sensor.glucose_random_sugar_02"
    trend_sensor: "sensor.glucose_random_trend_02"
  - platform: cgm_monitor
    name: "CGM Subject 3"
    glucose_sensor: "sensor.glucose_random_sugar_03"
    trend_sensor: "sensor.glucose_random_trend_03"
  - platform: cgm_monitor
    name: "CGM Subject 4"
    glucose_sensor: "sensor.glucose_random_sugar_04"
    trend_sensor: "sensor.glucose_random_trend_04"
  - platform: cgm_monitor
    name: "CGM Subject 5"
    glucose_sensor: "sensor.glucose_random_sugar_05"
    trend_sensor: "sensor.glucose_random_trend_05"
  - platform: cgm_monitor
    name: "CGM Subject 6"
    glucose_sensor: "sensor.glucose_random_sugar_06"
    trend_sensor: "sensor.glucose_random_trend_06"
  - platform: cgm_monitor
    name: "CGM Subject 7"
    glucose_sensor: "sensor.glucose_random_sugar_07"
    trend_sensor: "sensor.glucose_random_trend_07"
  - platform: cgm_monitor
    name: "CGM Subject 8"
    glucose_sensor: "sensor.glucose_random_sugar_08"
    trend_sensor: "sensor.glucose_random_trend_08"
    priority_mapping_overrides:
      - state: "ok"
        trend: "steady"
        priority: "critical"

  - platform: history_stats
    name: "CGM Subject 1 Target"
    entity_id: sensor.cgm_subject_1_state
    state: "ok"
    type: ratio
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"
  - platform: history_stats
    name: "CGM Subject 2 Target"
    entity_id: sensor.cgm_subject_2_state
    state: "ok"
    type: ratio
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"
  - platform: history_stats
    name: "CGM Subject 3 Target"
    entity_id: sensor.cgm_subject_3_state
    state: "ok"
    type: ratio
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"
  - platform: history_stats
    name: "CGM Subject 4 Target"
    entity_id: sensor.cgm_subject_4_state
    state: "ok"
    type: ratio
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"
  - platform: history_stats
    name: "CGM Subject 5 Target"
    entity_id: sensor.cgm_subject_5_state
    state: "ok"
    type: ratio
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"
  - platform: history_stats
    name: "CGM Subject 6 Target"
    entity_id: sensor.cgm_subject_6_state
    state: "ok"
    type: ratio
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"
  - platform: history_stats
    name: "CGM Subject 7 Target"
    entity_id: sensor.cgm_subject_7_state
    state: "ok"
    type: ratio
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"
  - platform: history_stats
    name: "CGM Subject 8 Target"
    entity_id: sensor.cgm_subject_8_state
    state: "ok"
    type: ratio
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"