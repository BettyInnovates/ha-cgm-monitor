template:
  - sensor:
      # Subject 01
      - name: "glucose Random Sugar 01"
        unique_id: t_glucose_random_sugar_01
        unit_of_measurement: mg/dL
        device_class: blood_glucose_concentration
        state_class: measurement
        state: >
          {% set sugar = [87, 142, 63, 198, 110, 225, 78, 155] %}
          {% set interval = 5 %}
          {% set minutes = now().hour * 60 + now().minute %}
          {% set hour_hash = now().hour * 2654435761 % 100 %}
          {% if hour_hash < 10 %}unknown
          {% elif hour_hash < 20 %}unavailable
          {% else %}{{ sugar[(minutes // interval) % (sugar | count)] }}
          {% endif %}
      - name: "glucose Random Trend 01"
        unique_id: t_glucose_random_trend_01
        state: >
          {% set trends = ["steady", "rising", "falling_slightly", "rising_quickly", "falling", "rising_slightly", "falling_quickly", "steady"] %}
          {% set interval = 5 %}
          {% set minutes = now().hour * 60 + now().minute %}
          {% set hour_hash = now().hour * 2654435761 % 100 %}
          {% if hour_hash < 10 %}unknown
          {% elif hour_hash < 20 %}unavailable
          {% else %}{{ trends[(minutes // interval) % (trends | count)] }}
          {% endif %}

